<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章详情 - 润物细无声</title>
  <!-- Open Graph（由 JS 动态填充） -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta name="description" content="" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://blog-worker.diaoyudao110.workers.dev" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="dns-prefetch" href="https://giscus.app" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" media="print" onload="this.media='all'" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" /></noscript>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script>
    (function(){
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .post-page { padding: 8rem 1.5rem 6rem; min-height: 100vh; }
    .post-page .container { max-width: 720px; margin: 0 auto; }
    .post-page-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .post-page-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700; line-height: 1.3;
      margin-bottom: 2rem; color: var(--text-primary);
    }
    .post-body { color: var(--text-secondary); font-size: 1.05rem; line-height: 1.9; }
    .post-body h1,.post-body h2,.post-body h3,.post-body h4 {
      font-family: 'Noto Serif SC', serif;
      color: var(--text-primary); margin: 2rem 0 1rem;
    }
    .post-body h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .post-body h3 { font-size: 1.2rem; }
    .post-body p { margin-bottom: 1.2rem; }
    .post-body code {
      background: var(--bg-card); padding: 0.15rem 0.4rem;
      border-radius: 4px; font-size: 0.9em; color: var(--accent);
    }
    .post-body pre {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem; overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .post-body pre code { background: none; padding: 0; color: var(--text-primary); }
    .post-body blockquote {
      border-left: 3px solid var(--accent); padding-left: 1rem;
      color: var(--text-muted); margin: 1.5rem 0;
    }
    .post-body a { color: var(--accent); text-decoration: underline; }
    .post-body ul,.post-body ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }
    .post-body li { margin-bottom: 0.4rem; }
    .post-body img { max-width: 100%; border-radius: var(--radius); }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--text-secondary); font-size: 0.9rem;
      margin-bottom: 2rem; transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }
    .loading-msg { color: var(--text-muted); text-align: center; padding: 4rem 0; }
    .giscus-wrap { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .post-stats { display:flex; gap:1.2rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem; font-size:0.85rem; color:var(--text-muted); }
    .post-stats span { display:flex; align-items:center; gap:0.3rem; }
    .post-nav { display:flex; justify-content:space-between; gap:1rem; margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border); }
    .post-nav a { flex:1; padding:1rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); text-decoration:none; color:var(--text-secondary); font-size:0.9rem; transition:border-color 0.3s,color 0.3s; }
    .post-nav a:hover { border-color:var(--accent); color:var(--accent); }
    .post-nav .nav-prev { text-align:left; }
    .post-nav .nav-next { text-align:right; }
    .post-nav .nav-label { font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem; }
    .post-nav .nav-title { font-weight:500; }
    .share-bar { display:flex; align-items:center; gap:0.8rem; margin-top:2.5rem; padding:1.2rem; background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border); }
    .share-bar span { font-size:0.9rem; color:var(--text-muted); margin-right:0.3rem; }
    .share-btn { padding:0.4rem 0.9rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
    .share-btn:hover { border-color:var(--accent); color:var(--accent); }
    .post-tags { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1rem; }
    .post-tag { padding:0.2rem 0.7rem; border-radius:20px; background:var(--bg-card); border:1px solid var(--border); font-size:0.8rem; color:var(--text-muted); text-decoration:none; }
    .post-tag:hover { border-color:var(--accent); color:var(--accent); }
    /* 点赞 */
    .like-bar { display:flex; align-items:center; gap:0.8rem; margin-top:1.5rem; }
    .like-btn { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1.2rem; border-radius:24px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); cursor:pointer; font-size:0.95rem; transition:all 0.3s; }
    .like-btn:hover, .like-btn.liked { border-color:#f87171; color:#f87171; background:rgba(248,113,113,0.08); }
    .like-btn.liked { cursor:default; }
    /* 相关文章 */
    .related-posts { margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border); }
    .related-posts h3 { font-family:'Noto Serif SC',serif; font-size:1.1rem; margin-bottom:1rem; color:var(--text-primary); }
    .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
    .related-card { padding:1rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); text-decoration:none; display:block; transition:border-color 0.3s; }
    .related-card:hover { border-color:var(--accent); }
    .related-card .r-cat { font-size:0.75rem; color:var(--accent); margin-bottom:0.4rem; }
    .related-card .r-title { font-size:0.9rem; color:var(--text-primary); font-weight:500; line-height:1.4; }
    .related-card .r-date { font-size:0.78rem; color:var(--text-muted); margin-top:0.4rem; }
    /* 灯箱 */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; display:flex; align-items:center; justify-content:center; cursor:zoom-out; opacity:0; transition:opacity 0.3s; pointer-events:none; }
    .lightbox.open { opacity:1; pointer-events:auto; }
    .lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; }
    .lightbox-close { position:absolute; top:1.5rem; right:1.5rem; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.5rem; width:2.5rem; height:2.5rem; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    /* 打印样式 */
    @media print {
      .navbar, .toc-sidebar, .back-top, .share-bar, .like-bar, .post-nav, .related-posts, .giscus-wrap, .lightbox, footer { display:none !important; }
      body { background:#fff !important; color:#000 !important; }
      .post-page { padding: 1rem !important; }
      .post-body { color:#000 !important; font-size:12pt; line-height:1.8; }
      .post-body a { color:#000 !important; text-decoration:underline; }
      .post-body pre { border:1px solid #ccc !important; background:#f5f5f5 !important; }
      .post-body code { background:#f5f5f5 !important; color:#333 !important; }
      .post-page-title { color:#000 !important; }
    }
  </style>
</head>
<body>
  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress"></div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">润物细无声</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于我</a></li>
        <li><a href="index.html#posts">文章</a></li>
        <li><a href="index.html#projects">项目</a></li>
        <li><a href="index.html#timeline">时间线</a></li>
        <li><a href="index.html#contact">联系</a></li>
      </ul>
      <div style="display:flex;align-items:center;gap:0.3rem">
        <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
        <button class="theme-btn" id="soundMuteBtn" title="关闭音效">🔊</button>
        <button class="menu-btn" id="menuBtn">&#9776;</button>
      </div>
    </div>
  </nav>

  <!-- 文章目录（侧边栏） -->
  <nav class="toc-sidebar" id="tocSidebar" style="display:none">
    <h4>目录</h4>
    <div id="tocList"></div>
  </nav>

  <main class="post-page">
    <div class="container">
      <a href="index.html" class="back-link">← 返回首页</a>
      <div id="postContent">
        <p class="loading-msg">加载中……</p>
      </div>
      <!-- Giscus 评论 -->
      <div class="giscus-wrap" id="giscusWrap" style="display:none"></div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 小小王 · 润物细无声 · 用心记录每一天</p>
  </footer>

  <!-- 回到顶部 -->
  <button class="back-top" id="backTop" title="回到顶部">↑</button>

  <script>
    // ── 主题 ────────────────────────────────────────────────────────
    function getTheme() { return localStorage.getItem('theme') || 'dark'; }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      const btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = t === 'dark' ? '🌙' : '☀️';
      const giscus = document.querySelector('iframe.giscus-frame');
      if (giscus) {
        giscus.contentWindow.postMessage(
          { giscus: { setConfig: { theme: t === 'dark' ? 'dark' : 'light' } } },
          'https://giscus.app'
        );
      }
    }
    applyTheme(getTheme());
    document.getElementById('themeBtn').addEventListener('click', () => {
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    });

    // ── 导航栏 ───────────────────────────────────────────────────────
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.style.background = window.scrollY > 50
        ? (getTheme() === 'dark' ? 'rgba(13,13,13,0.95)' : 'rgba(248,247,244,0.97)')
        : (getTheme() === 'dark' ? 'rgba(13,13,13,0.8)' : 'rgba(248,247,244,0.85)');
    });
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });

    // ── 阅读进度条 ───────────────────────────────────────────────────
    const progressBar = document.getElementById('readingProgress');
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      progressBar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + '%' : '0%';
    });

    // ── 回到顶部 ─────────────────────────────────────────────────────
    const backTop = document.getElementById('backTop');
    window.addEventListener('scroll', () => {
      backTop.classList.toggle('visible', window.scrollY > 400);
    });
    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ── 加载文章 ─────────────────────────────────────────────────────
    // 配置 marked + highlight.js
    if (typeof hljs !== 'undefined') {
      marked.setOptions({
        highlight: function(code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        }
      });
    }
    const WORKER_URL = (typeof window !== 'undefined' && window.WORKER_URL) ? window.WORKER_URL : '';
    const params = new URLSearchParams(location.search);
    const postId = params.get('id');

    function loadGiscus(theme) {
      const wrap = document.getElementById('giscusWrap');
      wrap.style.display = '';
      // ⚠️ 请前往 https://giscus.app 获取你的 repo/repoId/category/categoryId 替换下方占位符
      const script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', 'diaoyudao100/blog');
      script.setAttribute('data-repo-id', 'R_kgDORnmDZQ');
      script.setAttribute('data-category', 'Announcements');
      script.setAttribute('data-category-id', 'DIC_kwDORnmDZc4C4c3H');
      script.setAttribute('data-mapping', 'pathname');
      script.setAttribute('data-strict', '0');
      script.setAttribute('data-reactions-enabled', '1');
      script.setAttribute('data-emit-metadata', '0');
      script.setAttribute('data-input-position', 'bottom');
      script.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      script.setAttribute('data-lang', 'zh-CN');
      script.crossOrigin = 'anonymous';
      script.async = true;
      wrap.appendChild(script);
    }

    async function loadPost() {
      if (!postId) {
        document.getElementById('postContent').innerHTML = '<p class="loading-msg">未指定文章 ID</p>';
        return;
      }
      try {
        const base = WORKER_URL || (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
          ? 'http://localhost:8787'
          : 'https://blog-worker.diaoyudao110.workers.dev');
        const res = await fetch(`${base}/api/posts/${postId}`);
        if (!res.ok) throw new Error('文章不存在');
        const post = await res.json();

        // OG meta
        document.title = post.title + ' - 润物细无声';
        document.querySelector('meta[property="og:title"]').content = post.title;
        document.querySelector('meta[property="og:description"]').content = post.excerpt || '';
        document.querySelector('meta[name="description"]').content = post.excerpt || '';
        if (post.cover) document.querySelector('meta[property="og:image"]').content = post.cover;

        // 结构化数据 JSON-LD
        const jsonLd = document.createElement('script');
        jsonLd.type = 'application/ld+json';
        jsonLd.textContent = JSON.stringify({
          '@context': 'https://schema.org',
          '@type': 'BlogPosting',
          headline: post.title,
          description: post.excerpt || '',
          datePublished: post.date || '',
          image: post.cover || '',
          author: { '@type': 'Person', name: '小小王' },
          url: location.href,
        });
        document.head.appendChild(jsonLd);

        const wc = post.wordCount || (post.content || '').replace(/[#*`>\-\[\]!]/g, '').length;
        const mins = Math.max(1, Math.round(wc / 300));
        const coverHtml = post.cover ? `<img class="post-cover-hero" src="${post.cover}" alt="封面" loading="lazy" />` : '';
        const tagsHtml = (post.tags || []).length
          ? `<div class="post-tags">${post.tags.map(t => `<a href="index.html?tag=${encodeURIComponent(t)}" class="post-tag">#${t}</a>`).join('')}</div>`
          : '';
        const prevHtml = post.prev
          ? `<a href="post.html?id=${post.prev.id}" class="nav-prev"><div class="nav-label">← 上一篇</div><div class="nav-title">${post.prev.title}</div></a>`
          : '<span></span>';
        const nextHtml = post.next
          ? `<a href="post.html?id=${post.next.id}" class="nav-next"><div class="nav-label">下一篇 →</div><div class="nav-title">${post.next.title}</div></a>`
          : '<span></span>';

        document.getElementById('postContent').innerHTML = `
          ${coverHtml}
          <div class="post-page-meta">
            <span class="post-cat">${post.category || ''}</span>
            <span class="post-date">${post.date || ''}</span>
            <span class="read-time">· 约 ${mins} 分钟阅读</span>
          </div>
          <div class="post-stats">
            <span>📖 ${wc} 字</span>
            <span id="viewCount">👁 --</span>
          </div>
          <h1 class="post-page-title">${post.title}</h1>
          ${tagsHtml}
          <div class="post-body" id="postBody">${marked.parse(post.content || '')}</div>
          <div class="like-bar">
            <button class="like-btn" id="likeBtn" onclick="toggleLike()">❤️ 点赞 <span id="likeCount">--</span></button>
          </div>
          <div class="share-bar">
            <span>分享：</span>
            <button class="share-btn" onclick="copyLink()">🔗 复制链接</button>
            <button class="share-btn" onclick="shareWeibo()">微博</button>
            <button class="share-btn" onclick="shareTwitter()">Twitter</button>
          </div>
          <nav class="post-nav">${prevHtml}${nextHtml}</nav>
          <div class="related-posts" id="relatedPosts"></div>
        `;

        // 异步加载阅读量、点赞
        fetch(`${base}/api/views`).then(r => r.json()).then(views => {
          const el = document.getElementById('viewCount');
          if (el) el.textContent = '👁 ' + (views[postId] || 1) + ' 次阅读';
        }).catch(() => {});
        fetch(`${base}/api/likes`).then(r => r.json()).then(likes => {
          const el = document.getElementById('likeCount');
          if (el) el.textContent = likes[postId] || 0;
          // 已点赞状态
          const liked = localStorage.getItem('liked_' + postId);
          if (liked) {
            const btn = document.getElementById('likeBtn');
            if (btn) btn.classList.add('liked');
          }
        }).catch(() => {});

        // 相关文章
        fetch(`${base}/api/data`).then(r => r.json()).then(data => {
          const all = (data.posts || []).filter(p => p.id !== postId);
          const related = all.filter(p =>
            p.category === post.category ||
            (post.tags || []).some(t => (p.tags || []).includes(t))
          ).slice(0, 3);
          const wrap = document.getElementById('relatedPosts');
          if (wrap && related.length) {
            wrap.innerHTML = `<h3>相关文章</h3><div class="related-grid">${related.map(p => `
              <a href="post.html?id=${p.id}" class="related-card">
                <div class="r-cat">${p.category || ''}</div>
                <div class="r-title">${p.title}</div>
                <div class="r-date">${p.date || ''}</div>
              </a>`).join('')}</div>`;
          }
        }).catch(() => {});

        // 图片懒加载
        document.querySelectorAll('#postBody img').forEach(img => {
          img.setAttribute('loading', 'lazy');
        });
        // 代码高亮
        if (typeof hljs !== 'undefined') {
          document.querySelectorAll('#postBody pre code').forEach(block => hljs.highlightElement(block));
        }
        buildTOC();
        initLightbox();
        loadGiscus(getTheme());
      } catch (e) {
        document.getElementById('postContent').innerHTML =
          `<p class="loading-msg">${e.message || '加载失败'}</p>`;
      }
    }

    // 点赞
    function toggleLike() {
      const btn = document.getElementById('likeBtn');
      if (!btn || btn.classList.contains('liked')) return;
      const base = WORKER_URL || 'https://blog-worker.diaoyudao110.workers.dev';
      fetch(`${base}/api/like/${postId}`, { method: 'POST' })
        .then(r => r.json()).then(data => {
          const el = document.getElementById('likeCount');
          if (el) el.textContent = data.likes;
          btn.classList.add('liked');
          localStorage.setItem('liked_' + postId, '1');
        }).catch(() => {});
    }

    // 灯箱
    function initLightbox() {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      document.querySelectorAll('.post-body img').forEach(img => {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightbox.classList.add('open');
        });
      });
      lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
      document.getElementById('lightboxClose').addEventListener('click', e => {
        e.stopPropagation();
        lightbox.classList.remove('open');
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') lightbox.classList.remove('open');
      });
    }

    // TOC 平滑滚动
    function buildTOC() {
      const headings = document.querySelectorAll('.post-body h2, .post-body h3');
      if (headings.length < 2) return;
      const tocList = document.getElementById('tocList');
      const tocSidebar = document.getElementById('tocSidebar');
      let html = '';
      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const cls = h.tagName === 'H3' ? ' toc-h3' : '';
        html += `<a href="#${id}" class="${cls}">${h.textContent}</a>`;
      });
      tocList.innerHTML = html;
      tocSidebar.style.display = '';
      // 平滑滚动
      tocList.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const target = document.getElementById(a.getAttribute('href').slice(1));
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
      // 滚动高亮
      const tocLinks = tocList.querySelectorAll('a');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            tocLinks.forEach(a => a.classList.remove('active'));
            const active = tocList.querySelector(`a[href="#${entry.target.id}"]`);
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '-64px 0px -70% 0px' });
      headings.forEach(h => observer.observe(h));
    }

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => alert('链接已复制！')).catch(() => {
        prompt('复制此链接：', location.href);
      });
    }
    function shareWeibo() {
      window.open('https://service.weibo.com/share/share.php?url=' + encodeURIComponent(location.href) + '&title=' + encodeURIComponent(document.title), '_blank');
    }
    function shareTwitter() {
      window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(document.title), '_blank');
    }

    loadPost();
