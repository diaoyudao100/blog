<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 润物细无声</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <style>
  /* ===== 手机端响应式 ===== */
  #mobileTopbar { display: none; }
  #mobileMask { display: none; }

  @media (max-width: 768px) {
    /* 顶部栏 */
    #mobileTopbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #mobileTopbar .m-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #mobileMenuBtn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 1.1rem;
      cursor: pointer;
    }
    /* 遮罩 */
    #mobileMask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 150;
    }
    /* 侧边栏变抽屉 */
    .admin-layout { flex-direction: column; }
    .admin-sidebar {
      position: fixed !important;
      top: 0; left: 0; bottom: 0;
      width: 240px !important;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
    }
    .admin-sidebar.open {
      transform: translateX(0);
    }
    .admin-main { margin-left: 0 !important; padding: 1rem 0.8rem !important; }
    /* 卡片 */
    .card { padding: 1rem !important; }
    .panel-header .btn { padding: 0.55rem 1rem !important; font-size: 0.85rem !important; }
    .panel-header .btn-primary { width: auto !important; }
    /* 列表项 */
    .list-item { flex-wrap: wrap !important; gap: 0.5rem !important; padding: 0.8rem !important; }
    .list-item-info { width: 100% !important; }
    .list-item-actions { width: 100% !important; justify-content: flex-end; }
    /* 模态框从底部弹出 */
    .modal-overlay { padding: 0 !important; align-items: flex-end !important; }
    .modal {
      border-radius: 16px 16px 0 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      max-height: 92vh !important;
      padding: 1.2rem 1rem !important;
    }
    .modal-footer { flex-direction: column-reverse !important; gap: 0.5rem !important; }
    .modal-footer .btn { width: 100% !important; }
    .post-meta-row { flex-direction: column !important; gap: 0 !important; }
    .editor-split { flex-direction: column !important; }
    #pm-preview { display: none !important; }
    #pm-content { border-radius: 0 0 8px 8px !important; border-right: none !important; min-height: 240px !important; flex: none !important; width: 100% !important; }
    .avatar-upload-wrap { flex-direction: column !important; align-items: flex-start !important; gap: 0.8rem !important; }
    .toast { right: 1rem !important; left: 1rem !important; bottom: 1rem !important; text-align: center; }
  }
  </style>
</head>
<body>

<!-- ===== 登录页 ===== -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <h1>润物细无声</h1>
    <p class="subtitle">后台管理系统</p>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="loginPwd" placeholder="请输入密码" />
    </div>
    <button class="btn btn-primary" id="loginBtn">登 录</button>
    <p class="login-error" id="loginErr"></p>
  </div>
</div>

<!-- ===== 手机端顶部栏 ===== -->
<div id="mobileTopbar">
  <span class="m-title">润物细无声 后台</span>
  <button id="mobileMenuBtn">☰</button>
</div>
<!-- 遮罩 -->
<div id="mobileMask"></div>

<!-- ===== 管理面板 ===== -->
<div id="adminPage" class="admin-layout" style="display:none">
  <!-- 侧边栏 -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      润物细无声
      <span>后台管理</span>
    </div>
    <nav>
      <div class="nav-item active" data-tab="profile"><span class="icon">👤</span>个人信息</div>
      <div class="nav-item" data-tab="hero"><span class="icon">🌟</span>Hero 区</div>
      <div class="nav-item" data-tab="posts"><span class="icon">📝</span>文章管理</div>
      <div class="nav-item" data-tab="projects"><span class="icon">🛠️</span>项目管理</div>
      <div class="nav-item" data-tab="timeline"><span class="icon">📅</span>时间线</div>
      <div class="nav-item" data-tab="skills"><span class="icon">💡</span>技能树</div>
      <div class="nav-item" data-tab="links"><span class="icon">🔗</span>友情链接</div>
      <div class="nav-item" data-tab="stats"><span class="icon">📊</span>统计</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-secondary" id="logoutBtn" style="width:100%">退出登录</button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="admin-main">

    <!-- 个人信息 -->
    <section id="tab-profile" class="tab-panel">
      <div class="panel-header">
        <h2>个人信息</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="saveProfile">保存信息</button>
      </div>
      <div class="card">
        <div class="form-group"><label>名字 / 昵称</label><input type="text" id="p-name" /></div>
        <div class="form-group"><label>头像备用文字（无图片时显示）</label><input type="text" id="p-nickname" /></div>
        <div class="form-group">
          <label>头像图片</label>
          <div class="avatar-upload-wrap">
            <div class="avatar-preview" id="avatarPreview"></div>
            <div class="avatar-upload-right">
              <input type="file" id="p-avatar-file" accept="image/*" style="display:none" />
              <button class="btn btn-secondary" id="avatarUploadBtn">上传图片</button>
              <button class="btn btn-danger btn-sm" id="avatarClearBtn" style="margin-top:0.5rem">清除图片</button>
              <p style="font-size:0.8rem;color:var(--text-muted);margin-top:0.5rem">建议正方形，不超过 500KB</p>
            </div>
          </div>
        </div>
        <div class="form-group"><label>简介第一段</label><textarea id="p-intro1" rows="3"></textarea></div>
        <div class="form-group"><label>简介第二段</label><textarea id="p-intro2" rows="3"></textarea></div>
        <div class="form-group">
          <label>标签（回车添加）</label>
          <div class="tags-input-wrap" id="tagsWrap">
            <input type="text" id="tagInput" placeholder="输入标签后按回车" />
          </div>
        </div>
        <div class="form-group"><label>邮件</label><input type="text" id="p-email" /></div>
        <div class="form-group"><label>GitHub 链接</label><input type="text" id="p-github" /></div>
        <div class="form-group"><label>Twitter 链接</label><input type="text" id="p-twitter" /></div>
        <div class="form-group"><label>微信（可填二维码图片地址或用户名）</label><input type="text" id="p-wechat" /></div>
      </div>
    </section>

    <!-- Hero -->
    <section id="tab-hero" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>Hero 区编辑</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="saveHero">保存Hero</button>
      </div>
      <div class="card">
        <div class="form-group"><label>副标题（小字）</label><input type="text" id="h-subtitle" /></div>
        <div class="form-group"><label>主标题</label><input type="text" id="h-title" /></div>
        <div class="form-group"><label>描述文字</label><textarea id="h-desc" rows="2"></textarea></div>
      </div>
    </section>

    <!-- 文章管理 -->
    <section id="tab-posts" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>文章管理</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="newPostBtn">+新建文章</button>
      </div>
      <div id="postsList"></div>
    </section>

    <!-- 项目管理 -->
    <section id="tab-projects" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>项目管理</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="newProjectBtn">+新建项目</button>
      </div>
      <div id="projectsList"></div>
    </section>

    <!-- 时间线 -->
    <section id="tab-timeline" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>时间线</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="newTlBtn">+新建条目</button>
      </div>
      <div id="timelineList"></div>
    </section>

    <!-- 技能树 -->
    <section id="tab-skills" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>技能树</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="newSkillCatBtn">+新建分类</button>
      </div>
      <div id="skillsList"></div>
    </section>

    <!-- 友情链接 -->
    <section id="tab-links" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>友情链接</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;cursor:pointer;" id="newLinkBtn">+新建友链</button>
      </div>
      <div id="linksList"></div>
    </section>

    <!-- 统计 -->
    <section id="tab-stats" class="tab-panel" style="display:none">
      <div class="panel-header">
        <h2>访客统计</h2>
        <button style="flex-shrink:0;white-space:nowrap;padding:0.4rem 0.8rem;font-size:0.82rem;border-radius:6px;background:var(--bg-card-hover);color:var(--text-secondary);border:1px solid var(--border);cursor:pointer;" onclick="loadStats()">刷新数据</button>
      </div>
      <div id="statsWrap"><p style="color:var(--text-muted);text-align:center;padding:2rem">点击刷新加载数据</p></div>
    </section>

  </main>

<!-- ===== 文章编辑模态框 ===== -->
<div class="modal-overlay" id="postModal">
  <div class="modal" style="max-width:900px;width:95vw">
    <div class="modal-header">
      <h3 id="postModalTitle">新建文章</h3>
      <button class="modal-close" data-close="postModal">✕</button>
    </div>
    <div class="form-group"><label>标题</label><input type="text" id="pm-title" /></div>
    <div class="post-meta-row" style="display:flex;gap:1rem">
      <div class="form-group" style="flex:1"><label>分类</label><input type="text" id="pm-category" placeholder="技术 / 随笔 / 生活 …" /></div>
      <div class="form-group" style="flex:1"><label>标签（逗号分隔）</label><input type="text" id="pm-tags" placeholder="知识管理, 效率" /></div>
      <div class="form-group" style="flex:0 0 auto"><label>日期</label><input type="date" id="pm-date" /></div>
    </div>
    <div class="form-group">
      <label>封面图 URL（可选）</label>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <input type="text" id="pm-cover" placeholder="https://example.com/cover.jpg" style="flex:1" />
        <input type="file" id="pm-cover-file" accept="image/*" style="display:none" />
        <button type="button" class="btn btn-sm btn-secondary" id="coverUploadBtn">上传图片</button>
      </div>
    </div>
    <div class="form-group"><label>摘要</label><textarea id="pm-excerpt" rows="2"></textarea></div>
    <div class="form-group">
      <label style="display:flex;align-items:center;justify-content:space-between">
        <span>正文（Markdown）</span>
        <label style="font-weight:normal;display:flex;align-items:center;gap:0.4rem;cursor:pointer">
          <input type="checkbox" id="pm-published" checked /> 已发布
        </label>
      </label>
      <div class="editor-wrap">
        <div class="editor-toolbar">
          <button data-md="**{sel}**"><b>B</b></button>
          <button data-md="*{sel}*"><i>I</i></button>
          <button data-md="# {sel}">H1</button>
          <button data-md="## {sel}">H2</button>
          <button data-md="### {sel}">H3</button>
          <button data-md="`{sel}`">Code</button>
          <button data-md="```\n{sel}\n```">Block</button>
          <button data-md="> {sel}">Quote</button>
          <button data-md="- {sel}">List</button>
          <button data-md="[{sel}](url)">Link</button>
        </div>
        <div class="editor-split" style="display:flex;gap:0">
          <textarea id="pm-content" style="flex:1;border-radius:0 0 0 8px;min-height:320px;font-family:monospace;border-right:1px solid var(--border)"></textarea>
          <div id="pm-preview" style="flex:1;min-height:320px;padding:1rem;overflow-y:auto;border-radius:0 0 8px 0;background:var(--bg-card);font-size:0.9rem;line-height:1.7;color:var(--text-secondary)"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="postModal">取消</button>
      <button class="btn btn-primary" id="savePostBtn">保存文章</button>
    </div>
  </div>
</div>

<!-- ===== 项目编辑模态框 ===== -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="projectModalTitle">新建项目</h3>
      <button class="modal-close" data-close="projectModal">✕</button>
    </div>
    <div class="form-group"><label>图标（Emoji）</label><input type="text" id="pj-icon" placeholder="🛠️" /></div>
    <div class="form-group"><label>项目名称</label><input type="text" id="pj-title" /></div>
    <div class="form-group"><label>描述</label><textarea id="pj-desc" rows="2"></textarea></div>
    <div class="form-group"><label>技术栈（逗号分隔）</label><input type="text" id="pj-tech" placeholder="Vue, Node, CSS" /></div>
    <div class="form-group"><label>演示链接</label><input type="text" id="pj-demo" /></div>
    <div class="form-group"><label>源码链接</label><input type="text" id="pj-repo" /></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="projectModal">取消</button>
      <button class="btn btn-primary" id="saveProjectBtn">保存项目</button>
    </div>
  </div>
</div>

<!-- ===== 时间线编辑模态框 ===== -->
<div class="modal-overlay" id="tlModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="tlModalTitle">新建时间线条目</h3>
      <button class="modal-close" data-close="tlModal">✕</button>
    </div>
    <div class="form-group"><label>年份</label><input type="text" id="tl-year" placeholder="2025" /></div>
    <div class="form-group"><label>标题</label><input type="text" id="tl-title" /></div>
    <div class="form-group"><label>描述</label><textarea id="tl-desc" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="tlModal">取消</button>
      <button class="btn btn-primary" id="saveTlBtn">保存</button>
    </div>
  </div>
</div>

<!-- ===== 技能分类编辑模态框 ===== -->
<div class="modal-overlay" id="skillCatModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="skillCatModalTitle">新建技能分类</h3>
      <button class="modal-close" data-close="skillCatModal">✕</button>
    </div>
    <div class="form-group"><label>分类名称</label><input type="text" id="sc-category" placeholder="前端开发" /></div>
    <div id="sc-items-wrap">
      <label style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.5rem;display:block">技能条目</label>
      <div id="sc-items-list"></div>
      <button class="btn btn-secondary btn-sm" id="addSkillItemBtn" style="margin-top:0.5rem">+ 添加技能</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="skillCatModal">取消</button>
      <button class="btn btn-primary" id="saveSkillCatBtn">保存</button>
    </div>
  </div>
</div>

<!-- ===== 友链编辑模态框 ===== -->
<div class="modal-overlay" id="linkModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="linkModalTitle">新建友链</h3>
      <button class="modal-close" data-close="linkModal">✕</button>
    </div>
    <div class="form-group"><label>图标（Emoji）</label><input type="text" id="lk-icon" placeholder="🌐" /></div>
    <div class="form-group"><label>名称</label><input type="text" id="lk-name" /></div>
    <div class="form-group"><label>链接 URL</label><input type="text" id="lk-url" placeholder="https://" /></div>
    <div class="form-group"><label>描述</label><textarea id="lk-desc" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="linkModal">取消</button>
      <button class="btn btn-primary" id="saveLinkBtn">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // 手机端抽屉菜单
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mobileMask = document.getElementById('mobileMask');
  const adminSidebar = document.querySelector('.admin-sidebar');
  function openMenu() {
    adminSidebar.classList.add('open');
    mobileMask.style.display = 'block';
  }
  function closeMenu() {
    adminSidebar.classList.remove('open');
    mobileMask.style.display = 'none';
  }
  if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openMenu);
  if (mobileMask) mobileMask.addEventListener('click', closeMenu);
  // 点击导航项后关闭菜单
  document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
    item.addEventListener('click', () => {
      if (window.innerWidth <= 768) closeMenu();
    });
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
